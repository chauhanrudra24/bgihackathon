<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Dashboard</title>
    <!-- Modern font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body style="display: none;" id="dashboardBody">
<!-- Body is hidden until auth confirms admin role -->

<div class="dashboard">
    <div class="header-flex">
        <h1>Government Dashboard</h1>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
    
    <div class="update-timer" id="updateTimer">Waiting for connection...</div>
    
    <div class="card">
        <h3>TDS Level</h3>
        <div class="value loading" id="tdsValue">--<span class="unit">ppm</span></div>
        <div class="status" id="tdsStatus">Waiting...</div>
    </div>
    
    <div class="card">
        <h3>Turbidity</h3>
        <div class="value loading" id="turbidityValue">--<span class="unit">V</span></div>
        <div class="status" id="waterStatus">Waiting...</div>
    </div>

    <div class="card final-card">
        <h3>Overall Water Quality</h3>
        <div class="status" id="finalStatus">Waiting...</div>
    </div>
</div>

<script type="module" src="/src/dashboard.js"></script>

</body>
</html>
