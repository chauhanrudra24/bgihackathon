<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Dashboard</title>
    <!-- Modern font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Sleek dark mode background */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .dashboard {
            background: rgba(30, 41, 59, 0.8); /* Glassmorphism effect */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
            transition: transform 0.3s ease;
        }
        .dashboard:hover {
            transform: translateY(-5px);
        }
        h1 {
            margin-top: 0;
            color: #38bdf8;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 2rem;
            font-size: 2.2rem;
        }
        .card {
            background: #334155;
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border-left: 5px solid #38bdf8;
            transition: background 0.3s ease;
        }
        .card:hover {
            background: #3f4e66;
        }
        .card h3 {
            margin: 0;
            font-size: 1rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .value {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 0.5rem 0;
            color: #ffffff;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 5px;
        }
        .unit {
            font-size: 1.2rem;
            font-weight: 600;
            color: #94a3b8;
        }
        .status {
            font-size: 1.5rem;
            font-weight: 800;
            color: #10b981; /* Default Clear Green */
            text-transform: uppercase;
            margin-top: 0.5rem;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 8px;
            background: rgba(16, 185, 129, 0.1);
        }
        .status.dirty {
            color: #ef4444; /* Dirty Red */
            background: rgba(239, 68, 68, 0.1);
        }
        .status.warning {
            color: #f59e0b; /* Amber */
            background: rgba(245, 158, 11, 0.1);
        }
        .final-card {
            border-left-color: #a855f7; /* Purple */
        }
        .final-card h3 {
            color: #d8b4fe;
        }
        /* Update Timer */
        .update-timer {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 1.5rem;
            font-weight: 600;
            margin-top: -1.5rem;
        }
        .update-timer span {
            color: #38bdf8;
        }
        /* Loader styles before data arrives */
        .loading {
            opacity: 0.5;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>Government Dashboard</h1>
    <div class="update-timer" id="updateTimer">Waiting for connection...</div>
    
    <div class="card">
        <h3>TDS Level</h3>
        <div class="value loading" id="tdsValue">--<span class="unit">ppm</span></div>
        <div class="status" id="tdsStatus">Waiting...</div>
    </div>
    
    <div class="card">
        <h3>Turbidity</h3>
        <div class="value loading" id="turbidityValue">--<span class="unit">V</span></div>
        <div class="status" id="waterStatus">Waiting...</div>
    </div>

    <div class="card final-card">
        <h3>Overall Water Quality</h3>
        <div class="status" id="finalStatus">Waiting...</div>
    </div>
</div>

<script type="module">
    // Import standard Firebase JS v10 Web SDK modules
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

    // Import your private config from env.js
    import { firebaseConfig } from './env.js';

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // References to UI elements
    const tdsEl = document.getElementById('tdsValue');
    const turbidityEl = document.getElementById('turbidityValue');
    const statusEl = document.getElementById('waterStatus');
    const updateTimerEl = document.getElementById('updateTimer');
    const tdsStatusEl = document.getElementById('tdsStatus');
    const finalStatusEl = document.getElementById('finalStatus');

    // Reference to 'sensorData' inside Realtime Database
    const sensorRef = ref(db, 'sensorData');
    
    // Variables for countdown
    let countdownInterval;
    let secondsLeft = 5;

    // Listen for real-time updates via WebSockets
    onValue(sensorRef, (snapshot) => {
        const data = snapshot.val();
        
        if (data) {
            // Remove loading animation
            tdsEl.classList.remove('loading');
            turbidityEl.classList.remove('loading');

            // Reset and start countdown timer
            clearInterval(countdownInterval);
            secondsLeft = 5;
            updateTimerEl.innerHTML = `Next update in: <span>${secondsLeft}s</span>`;
            
            countdownInterval = setInterval(() => {
                secondsLeft--;
                if(secondsLeft > 0) {
                    updateTimerEl.innerHTML = `Next update in: <span>${secondsLeft}s</span>`;
                } else {
                    updateTimerEl.innerHTML = `<span>Updating...</span>`;
                }
            }, 1000);

            // Update DOM elements
            tdsEl.innerHTML = `${parseFloat(data.tdsValue).toFixed(2)}<span class="unit">ppm</span>`;
            turbidityEl.innerHTML = `${parseFloat(data.turbidityVoltage).toFixed(2)}<span class="unit">V</span>`;
            
            // Determine TDS Quality
            const tds = parseFloat(data.tdsValue);
            let tdsQuality = "";
            let tdsClass = "status";

            if (tds <= 50) {
                tdsQuality = "EXCELLENT / ULTRA-PURE";
                tdsClass = "status"; // Green
            } else if (tds <= 150) {
                tdsQuality = "IDEAL";
                tdsClass = "status"; // Green
            } else if (tds <= 300) {
                tdsQuality = "GOOD / ACCEPTABLE";
                tdsClass = "status"; // Green
            } else if (tds <= 500) {
                tdsQuality = "FAIR";
                tdsClass = "status warning"; // Yellow
            } else {
                tdsQuality = "POOR / UNACCEPTABLE";
                tdsClass = "status dirty"; // Red
            }

            tdsStatusEl.innerText = tdsQuality;
            tdsStatusEl.className = tdsClass;

            // Turbidity Quality
            statusEl.innerText = data.waterStatus;
            if (data.waterStatus === 'CLEAR') {
                statusEl.className = 'status'; // Default green
            } else {
                statusEl.className = 'status dirty'; // Red styles
            }

            // Determine Final Overall Quality
            let finalQuality = "";
            let finalClass = "status";

            if (data.waterStatus === 'DIRTY') {
                finalQuality = "UNSAFE (DIRTY WATER)";
                finalClass = "status dirty"; // Red
            } else {
                // Water is CLEAR, so we judge based on TDS
                if (tds <= 50) {
                    finalQuality = "ULTRA-PURE (VERY FEW MINERALS)";
                    finalClass = "status"; // Green
                } else if (tds <= 150) {
                    finalQuality = "IDEAL (BEST TASTE & MINERAL BALANCE)";
                    finalClass = "status"; // Green
                } else if (tds <= 300) {
                    finalQuality = "GOOD / ACCEPTABLE (PLEASANT TO NORMAL TASTE)";
                    finalClass = "status"; // Green
                } else if (tds <= 500) {
                    finalQuality = "FAIR (NOTICEABLY HIGHER MINERAL TASTE)";
                    finalClass = "status warning"; // Yellow
                } else {
                    finalQuality = "POOR / UNACCEPTABLE (HARD, MINERAL-HEAVY)";
                    finalClass = "status dirty"; // Red
                }
            }

            // Adjust font size for long text
            finalStatusEl.style.fontSize = finalQuality.length > 25 ? "1.1rem" : "1.5rem";

            finalStatusEl.innerText = finalQuality;
            finalStatusEl.className = finalClass;
        }
    });
</script>

</body>
</html>
